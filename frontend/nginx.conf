server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This line is crucial for React/Vite SPAs! 
        # It tells Nginx: "If you can't find a file matching the URL, serve index.html instead"
        try_files $uri $uri/ /index.html;
    }
}
